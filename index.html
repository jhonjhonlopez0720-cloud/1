<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<style>
:root {
    --accent: #ff4d6d;
    --bg1: #0f0f1a;
    --bg2: #1a1a2e;
    --text: #f5f5f5;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, var(--bg2), var(--bg1));
    color: var(--text);
    overflow: hidden;
}

/* Glow background */
body::before {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: rgba(255,77,109,0.15);
    filter: blur(120px);
    animation: pulse 6s infinite alternate;
}

@keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.3); }
}

/* Container */
.container {
    text-align: center;
    z-index: 2;
    padding: 20px;
}

/* Bouquet */
.bouquet {
    display: flex;
    gap: 18px;
    justify-content: center;
    align-items: flex-end;
}

/* Tulip */
.tulip {
    position: relative;
    width: 60px;
    height: 160px;
}

/* Stem */
.stem {
    position: absolute;
    width: 6px;
    height: 100px;
    background: #2ecc71;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
}

/* Leaves */
.leaf {
    position: absolute;
    width: 30px;
    height: 15px;
    background: #27ae60;
    border-radius: 50%;
}

.leaf.left { bottom: 55px; left: 5px; transform: rotate(-30deg); }
.leaf.right { bottom: 70px; right: 5px; transform: rotate(30deg); }

/* Petals */
.petal {
    position: absolute;
    width: 36px;
    height: 55px;
    background: var(--accent);
    border-radius: 50% 50% 0 0;
    top: 10px;
    left: 50%;
    transform-origin: bottom center;
    transform: translateX(-50%) scaleY(0.2);
    transition: 1.2s cubic-bezier(.25,1.5,.5,1);
    box-shadow: 0 0 15px rgba(255,77,109,0.6);
}

.petal.left { transform: translateX(-50%) rotate(-20deg) scaleY(0.2); }
.petal.right { transform: translateX(-50%) rotate(20deg) scaleY(0.2); }

/* Bloom */
.bloom .petal {
    transform: translateX(-50%) scaleY(1);
}
.bloom .petal.left {
    transform: translateX(-50%) rotate(-30deg) scaleY(1);
}
.bloom .petal.right {
    transform: translateX(-50%) rotate(30deg) scaleY(1);
}

/* Button */
button {
    margin-top: 25px;
    padding: 12px 28px;
    border-radius: 999px;
    border: none;
    background: rgba(255,77,109,0.15);
    color: white;
    backdrop-filter: blur(10px);
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background: var(--accent);
    transform: scale(1.05);
}

/* Message */
.message {
    margin-top: 25px;
    max-width: 320px;
    margin-inline: auto;
    opacity: 0;
    transition: 2s;
    line-height: 1.6;
}
.show { opacity: 1; }

/* Typing cursor */
.cursor {
    display: inline-block;
    width: 5px;
    background: white;
    margin-left: 2px;
    animation: blink 1s infinite;
}
@keyframes blink {
    50% { opacity: 0; }
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 16px;
    animation: float 6s linear infinite;
}
@keyframes float {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-900px); opacity: 0; }
}

/* Mobile */
@media (max-width: 600px) {
    .bouquet { gap: 10px; }
    .tulip { width: 45px; height: 130px; }
}
</style>
</head>

<body>

<div class="container">

    <div class="bouquet" id="bouquet"></div>

    <button onclick="start()">Tap mo 'to 💖</button>

    <div class="message" id="message"></div>

</div>

<!-- Music -->
<iframe id="music" width="0" height="0"
src="https://www.youtube.com/embed/4vIQON2fDWM?enablejsapi=1"
allow="autoplay"></iframe>

<script>
const bouquet = document.getElementById("bouquet");

// Create tulips
for(let i=0;i<6;i++){
    const t = document.createElement("div");
    t.classList.add("tulip");
    t.innerHTML = `
        <div class="stem"></div>
        <div class="leaf left"></div>
        <div class="leaf right"></div>
        <div class="petal"></div>
        <div class="petal left"></div>
        <div class="petal right"></div>
    `;
    bouquet.appendChild(t);
}

const messageText = `Hi love 🥺💖

Happy monthsary sa atin hehe.

Alam mo naman minsan makulit ako, minsan sablay din,
pero ikaw pa rin talaga yung gusto ko araw-araw.

Thank you kasi lagi kang nandyan,
lalo na pag hindi ako okay.

Parang mga tulip na ‘to 🌷
habang nagbubloom sila,
ganun din ako sayo…

mas lalo lang akong nahuhulog.

Ikaw lang, palagi.

I love you ❤️`;

function start(){
    const tulips = document.querySelectorAll(".tulip");

    tulips.forEach((t, i)=>{
        setTimeout(()=> t.classList.add("bloom"), i*300);
    });

    setTimeout(showMessage, 2000);
    createHearts();
    playMusic();
}

/* Typing effect */
function showMessage(){
    const msg = document.getElementById("message");
    msg.classList.add("show");

    let i=0;
    function typing(){
        if(i < messageText.length){
            msg.innerHTML = messageText.substring(0,i) + '<span class="cursor"></span>';
            i++;
            setTimeout(typing, 35);
        } else {
            msg.innerHTML = messageText;
        }
    }
    typing();
}

/* Hearts */
function createHearts(){
    setInterval(()=>{
        const h=document.createElement("div");
        h.className="heart";
        h.innerHTML="❤️";
        h.style.left=Math.random()*window.innerWidth+"px";
        h.style.top="100%";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6000);
    },400);
}

/* Music */
function playMusic(){
    const iframe = document.getElementById("music");
    iframe.src += "&autoplay=1";
}
</script>

</body>
</html>
